<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Platform</title>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="header">
  <div class="logo">🎓 CourseHub</div>
  <nav class="nav">
    <a href="index.html">Home</a>
  </nav>
</header>

<h2>Admin Dashboard</h2>

<div class="admin-container">
  <input type="text" id="title" placeholder="Course Title">
  <input type="text" id="category" placeholder="Category">
  <input type="number" id="price" placeholder="Price">
  <button onclick="addCourse()">Add Course</button>
</div>

<h3>All Courses</h3>
<div id="adminCourses"></div>


<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">
    
    <div class="footer-section">
      <h3>CourseHub</h3>
      <p>Learn anytime, anywhere with our online courses.</p>
    </div>

    <div class="footer-section">
      <h4>Quick Links</h4>
      <a href="index.html">Home</a>
      <a href="#">Courses</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </div>

    <div class="footer-section">
      <h4>Contact</h4>
      <p>Email: support@coursehub.com</p>
      <p>Phone: +92 300 1234567</p>
    </div>

  </div>

  <p class="copyright">© 2026 CourseHub</p>
</footer>

<script src="js/app.js"></script>

<script>

function loadAdminCourses(){
  fetch("backend/get_courses.php")
  .then(res => res.json())
  .then(data => {
    let container = document.getElementById("adminCourses");
    container.innerHTML = "";

    data.forEach(c => {
      container.innerHTML += `
        <div>
          ${c.title} - ${c.category} - $${c.price}
          <button onclick="deleteCourse(${c.id})">Delete</button>
        </div>
      `;
    });
  });
}

function addCourse(){
  let title = document.getElementById("title").value;
  let category = document.getElementById("category").value;
  let price = document.getElementById("price").value;

  fetch("backend/add_course.php", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`title=${title}&category=${category}&price=${price}`
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    loadAdminCourses();
  });
}

function deleteCourse(id){
  fetch("backend/delete_course.php", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`id=${id}`
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    loadAdminCourses();
  });
}

loadAdminCourses();

</script>


</body>
</html>
