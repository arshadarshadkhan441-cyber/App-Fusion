<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">

  <h2>Admin Panel</h2>

  <button onclick="showSection('adminDashboard')">
    Dashboard
  </button>

  <button onclick="showSection('manageProjects')">
    Projects
  </button>

  <button onclick="showSection('manageUsers')">
    Users
  </button>

  <button onclick="logout()">
    Logout
  </button>

</div>

<div class="main-content">

<section id="adminDashboard" class="section">

<h1>Admin Dashboard</h1>

<div class="cards">

  <div class="card">
    <h3>Total Users</h3>
    <p id="totalUsers">0</p>
  </div>

  <div class="card">
    <h3>Total Projects</h3>
    <p id="totalProjects">0</p>
  </div>

 

</div>

</section>

<section id="manageProjects" class="section hidden">

<h1>Manage Projects</h1>

<div id="projectList"></div>

</section>

<section id="manageUsers" class="section hidden">

<h1>Manage Users</h1>

<div class="user-card">
<div id="userList"></div>

</div>

</section>

</div>

<script src="js/app.js"></script>
</body>
</html>
